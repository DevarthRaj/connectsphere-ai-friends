name: Deploy to AWS

on:
  # Trigger 1: Run automatically when the "Build" workflow finishes successfully
  workflow_run:
    workflows: ["Build and Push Docker Image"] # <--- MUST MATCH YOUR BUILD WORKFLOW NAME
    branches: [main]
    types: 
      - completed
      
  # Trigger 2: Allow manual button clicks (This adds the button you couldn't find!)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if the trigger was a manual click OR if the build was successful
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }} 
    
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull devarthraj/connectsphere:latest
            sudo docker stop connectsphere-app || true
            sudo docker rm connectsphere-app || true
            sudo docker run -d --name connectsphere-app -p 80:80 devarthraj/connectsphere:latest
            sudo docker system prune -af
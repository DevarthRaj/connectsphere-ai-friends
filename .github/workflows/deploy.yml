name: Deploy to AWS

on:
  push:
    branches:
      - main  # Or 'master', depending on your branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Pull the new image
            sudo docker pull devarthraj/connectsphere:latest
            
            # 2. Stop and remove the old container (|| true prevents error if it's not running)
            sudo docker stop connectsphere-app || true
            sudo docker rm connectsphere-app || true
            
            # 3. Run the new container
            # We give it a --name so it's easier to find next time
            sudo docker run -d --name connectsphere-app -p 80:80 devarthraj/connectsphere:latest
            
            # 4. THE 11-MONTH FIX: Clean up old images to save disk space
            sudo docker system prune -af
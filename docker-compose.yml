version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # args must be nested UNDER build, not at the same level
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "8080:80"
    restart: always
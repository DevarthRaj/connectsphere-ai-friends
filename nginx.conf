server {
    listen 80;
    
    root /usr/share/nginx/html;
    index index.html;

    # Static asset caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # ✅ ADD THIS BLOCK - Reverse proxy to ML service
    location /api/ml/ {
        proxy_pass http://ml-service:8000/;
        #           ↑ "ml-service" is the Docker Compose service name
        #           Docker's internal DNS resolves this automatically
        #           Port 8000 is only accessible internally, never from internet
        
        proxy_set_header Host $host;
        # ↑ Tells the ML service what domain was originally requested
        
        proxy_set_header X-Real-IP $remote_addr;
        # ↑ Passes the real user's IP to the ML service (useful for logs)
        
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # ↑ Standard header that tells backend "this came through a proxy"
    }

    # React Router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
}